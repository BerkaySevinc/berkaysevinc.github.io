<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Berkay Sevinç — Projects</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f7;
      --bg-card: #ffffff;
      --text: #1d1d1f;
      --text-secondary: #6e6e73;
      --border: #d2d2d7;
      --accent: #0071e3;
      --accent-hover: #0077ed;
      --shadow: rgba(0, 0, 0, 0.06);
      --toggle-bg: #e8e8ed;
      --toggle-icon: #1d1d1f;
      --skeleton: #e8e8ed;
      --skeleton-shine: #f5f5f7;
    }

    [data-theme="dark"] {
      --bg: #111113;
      --bg-card: #1c1c1e;
      --text: #f5f5f7;
      --text-secondary: #98989d;
      --border: #38383a;
      --accent: #2997ff;
      --accent-hover: #40a0ff;
      --shadow: rgba(0, 0, 0, 0.3);
      --toggle-bg: #2c2c2e;
      --toggle-icon: #f5f5f7;
      --skeleton: #2c2c2e;
      --skeleton-shine: #38383a;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem 1.5rem 1rem;
    }

    .header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .header h1 span {
      color: var(--accent);
    }

    /* Theme toggle */
    .theme-toggle {
      background: var(--toggle-bg);
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s, transform 0.2s;
      color: var(--toggle-icon);
      flex-shrink: 0;
    }

    .theme-toggle:hover {
      transform: scale(1.1);
    }

    .theme-toggle svg {
      width: 20px;
      height: 20px;
      transition: transform 0.3s;
    }

    .theme-toggle:hover svg {
      transform: rotate(15deg);
    }

    .theme-toggle .icon-moon { display: none; }
    [data-theme="dark"] .theme-toggle .icon-sun { display: none; }
    [data-theme="dark"] .theme-toggle .icon-moon { display: block; }

    /* Subtitle */
    .subtitle {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 1.5rem 2rem;
      color: var(--text-secondary);
      font-size: 0.95rem;
    }

    /* Grid */
    .grid {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 1.5rem 3rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }

    /* Card */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      box-shadow: 0 1px 3px var(--shadow);
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px var(--shadow);
      border-color: var(--accent);
    }

    .card-name {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .card-name .arrow {
      font-size: 0.85rem;
      opacity: 0;
      transform: translateX(-4px);
      transition: opacity 0.2s, transform 0.2s;
    }

    .card:hover .card-name .arrow {
      opacity: 1;
      transform: translateX(0);
    }

    .card-desc {
      color: var(--text-secondary);
      font-size: 0.875rem;
      line-height: 1.5;
    }

    /* Skeleton loading */
    .skeleton-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .skeleton-line {
      height: 14px;
      border-radius: 6px;
      background: linear-gradient(90deg, var(--skeleton) 25%, var(--skeleton-shine) 50%, var(--skeleton) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    .skeleton-line.title { width: 55%; height: 18px; }
    .skeleton-line.desc1 { width: 90%; }
    .skeleton-line.desc2 { width: 70%; }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Status bar */
    .status {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 1.5rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #30d158;
      flex-shrink: 0;
    }

    .status-dot.cached { background: #ff9f0a; }
    .status-dot.error { background: #ff453a; }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 4rem 1.5rem;
      color: var(--text-secondary);
    }

    .empty svg {
      width: 48px;
      height: 48px;
      margin-bottom: 1rem;
      opacity: 0.4;
    }

    /* Fade-in animation */
    .fade-in {
      animation: fadeIn 0.3s ease-out both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Footer */
    .footer {
      max-width: 960px;
      margin: 0 auto;
      padding: 1.5rem;
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-secondary);
      border-top: 1px solid var(--border);
    }

    .footer a {
      color: var(--accent);
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <header class="header">
    <h1>Berkay Sevinç<span>.</span></h1>
    <button class="theme-toggle" aria-label="Toggle theme">
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </header>

  <p class="subtitle">GitHub Pages projects</p>

  <div class="status" id="status"></div>
  <div class="grid" id="grid"></div>

  <footer class="footer">
    <a href="https://github.com/berkaysevinc" target="_blank" rel="noopener">github.com/berkaysevinc</a>
  </footer>

  <script>
    const GITHUB_USER = 'berkaysevinc';
    const CACHE_KEY = 'gh_pages_cache';
    const FETCH_LOG_KEY = 'gh_fetch_log';
    const RATE_WINDOW = 60 * 60 * 1000; // 1 hour
    const MAX_FETCHES_PER_HOUR = 10;

    // Theme
    function getPreferredTheme() {
      const saved = localStorage.getItem('theme');
      if (saved) return saved;
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }

    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
    }

    setTheme(getPreferredTheme());

    document.querySelector('.theme-toggle').addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      setTheme(current === 'dark' ? 'light' : 'dark');
    });

    // Fetch rate tracking
    function getFetchLog() {
      try {
        return JSON.parse(localStorage.getItem(FETCH_LOG_KEY)) || [];
      } catch { return []; }
    }

    function pruneFetchLog() {
      const cutoff = Date.now() - RATE_WINDOW;
      const log = getFetchLog().filter(t => t > cutoff);
      localStorage.setItem(FETCH_LOG_KEY, JSON.stringify(log));
      return log;
    }

    function canFetch() {
      return pruneFetchLog().length < MAX_FETCHES_PER_HOUR;
    }

    function recordFetch() {
      const log = pruneFetchLog();
      log.push(Date.now());
      localStorage.setItem(FETCH_LOG_KEY, JSON.stringify(log));
    }

    // Cache
    function getCached() {
      try {
        const raw = JSON.parse(localStorage.getItem(CACHE_KEY));
        if (raw && raw.ts && raw.data) return raw;
      } catch {}
      return null;
    }

    function setCache(data) {
      localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data }));
    }

    // UI helpers
    const grid = document.getElementById('grid');
    const status = document.getElementById('status');

    function showStatus(type, text) {
      status.innerHTML = `<span class="status-dot ${type}"></span>${text}`;
    }

    function showSkeletons() {
      grid.innerHTML = Array.from({ length: 6 }, () => `
        <div class="skeleton-card">
          <div class="skeleton-line title"></div>
          <div class="skeleton-line desc1"></div>
          <div class="skeleton-line desc2"></div>
        </div>
      `).join('');
    }

    function renderCards(repos) {
      if (repos.length === 0) {
        grid.innerHTML = `
          <div class="empty" style="grid-column: 1 / -1;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
              <polyline points="13 2 13 9 20 9"/>
            </svg>
            <p>No GitHub Pages projects found.</p>
          </div>`;
        return;
      }

      grid.innerHTML = repos.map((repo, i) => {
        const url = `https://${GITHUB_USER}.github.io/${repo.name}/`;
        const desc = repo.description || 'No description';
        return `
          <a href="${url}" class="card fade-in" style="animation-delay: ${i * 0.05}s" target="_blank" rel="noopener">
            <div class="card-name">${repo.name}<span class="arrow">→</span></div>
            <div class="card-desc">${desc}</div>
          </a>`;
      }).join('');
    }

    // Main
    async function loadProjects() {
      showSkeletons();

      // Rate limit reached — fall back to cache
      if (!canFetch()) {
        const cached = getCached();
        if (cached) {
          renderCards(cached.data);
          showStatus('cached', 'Loaded from cache (rate limit reached)');
        } else {
          renderCards([]);
          showStatus('error', 'Rate limit reached and no cache available');
        }
        return;
      }

      // Always fetch fresh data
      try {
        recordFetch();
        const res = await fetch(`https://api.github.com/users/${GITHUB_USER}/repos?per_page=100&sort=updated`);

        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const repos = await res.json();
        const pagesRepos = repos
          .filter(r => r.has_pages && r.name !== `${GITHUB_USER}.github.io`)
          .sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at))
          .map(r => ({ name: r.name, description: r.description }));

        setCache(pagesRepos);
        renderCards(pagesRepos);
        const remaining = MAX_FETCHES_PER_HOUR - pruneFetchLog().length;
        showStatus('', `Updated just now · ${remaining} requests remaining this hour`);
      } catch (err) {
        const cached = getCached();
        if (cached) {
          renderCards(cached.data);
          showStatus('error', `API error — loaded from cache`);
        } else {
          renderCards([]);
          showStatus('error', `Failed to load: ${err.message}`);
        }
      }
    }

    loadProjects();
  </script>
</body>
</html>
